taskGroups:
  - taskCount: 15
    parallelism: 4
    taskSpec:
      computeResource:
        cpuMilli: 4000
        memoryMib: 16384
      maxRunDuration: 43200s
      runnables:
        - container:
            imageUri: python:3.11-slim-bookworm
            commands:
              - /bin/sh
              - -c
              - |
                set -eu
                python3 -m pip install --upgrade pip
                python3 -m pip install google-cloud-storage
                cat > /tmp/download_phase36_worker.py <<'PY'
                from __future__ import annotations

                import pathlib

                from google.cloud import storage

                source_uri = "gs://codexalpaca-control-us/research_results/top100_liquidity_research_20260426/portfolio_event_driven_data/phase32_unexplored_top100_tranche1_20260428120500/launch/phase32_worker.sh"
                bucket_name, _, blob_name = source_uri[5:].partition("/")
                base = pathlib.Path("/tmp/phase32_worker_base.sh")
                storage.Client(project="codexalpaca").bucket(bucket_name).blob(blob_name).download_to_filename(str(base))
                text = base.read_text(encoding="utf-8")
                replacements = {
                    'PHASE_ID="phase32_unexplored_top100_tranche1_20260428120500"': 'PHASE_ID="phase36_core_liquidity_tranche_20260428180637"',
                    'SYMBOLS="AMD PLTR GOOG ORCL XOM XLE JPM UNH V BAC CRM XLI GE AMAT TQQQ"': 'SYMBOLS="SPY QQQ IWM TSLA TSM EFA EEM XLF XLV EWZ WFC GLD NKE XLP XBI"',
                    'BUILD_NAME="top100_phase32_${SYMBOL}_unexplored_options_20260302_20260423"': 'BUILD_NAME="top100_phase36_${SYMBOL}_core_liquidity_options_20260302_20260423"',
                    'CANDIDATE_QUEUE_JSON="$WORK/phase32_${SYMBOL}_queue.json"': 'CANDIDATE_QUEUE_JSON="$WORK/phase36_${SYMBOL}_queue.json"',
                    '"status": "phase32_unexplored_top100_tranche1_symbol_queue"': '"status": "phase36_core_liquidity_tranche_symbol_queue"',
                    '"objective": "research_only_expand_unexplored_top100_option_aware_candidate_coverage"': '"objective": "research_only_core_liquidity_candidate_discovery"',
                    'Path(f"phase32_{symbol}_queue.json")': 'Path(f"phase36_{symbol}_queue.json")',
                    'print(f"phase32_symbol_queue symbol={symbol} candidate_count={len(queue_items)}")': 'print(f"phase36_symbol_queue symbol={symbol} candidate_count={len(queue_items)}")',
                    'phase32_lag10_exit10_slip25_fee100': 'phase36_lag10_exit10_slip25_fee100',
                    'phase32_lag30_exit60_slip50_fee150': 'phase36_lag30_exit60_slip50_fee150',
                    'phase32_lag60_exit120_slip75_fee200': 'phase36_lag60_exit120_slip75_fee200',
                    '${REPORT_ROOT}/candidate_queue/phase32_${SYMBOL}_queue.json': '${REPORT_ROOT}/candidate_queue/phase36_${SYMBOL}_queue.json',
                }
                for old, new in replacements.items():
                    text = text.replace(old, new)
                target = pathlib.Path("/tmp/phase36_worker.sh")
                target.write_text(text, encoding="utf-8")
                target.chmod(0o755)
                PY
                python3 /tmp/download_phase36_worker.py
                /bin/sh /tmp/phase36_worker.sh
allocationPolicy:
  instances:
    - policy:
        machineType: e2-standard-4
        provisioningModel: STANDARD
        bootDisk:
          type: pd-standard
          sizeGb: 150
  location:
    allowedLocations:
      - regions/us-central1
      - zones/us-central1-a
      - zones/us-central1-b
      - zones/us-central1-c
      - zones/us-central1-f
  serviceAccount:
    email: 922745393036-compute@developer.gserviceaccount.com
  labels:
    app: codexalpaca
    plane: research
    broker: "false"
    wave: top100
    phase: phase36
    tranche: core-liq
logsPolicy:
  destination: CLOUD_LOGGING
